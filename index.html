<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adepeju Adedamola | Digital Headquarters</title>
    <meta name="description" content="Premium creative partner helping ambitious brands communicate through cinematic storytelling and strategic impact." />
    <!-- Prevent external Web3 wallet browser extension redefinition errors from interrupting the app -->
    <script>
      (function() {
        window.addEventListener('error', function(e) {
          if (e.message && (e.message.indexOf('ethereum') !== -1 || e.message.indexOf('Cannot redefine property') !== -1)) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);
        window.addEventListener('unhandledrejection', function(e) {
          if (e.reason && e.reason.message && (e.reason.message.indexOf('ethereum') !== -1 || e.reason.message.indexOf('Cannot redefine property') !== -1)) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);
      })();
    </script>
  </head>
  <body class="bg-[#050505]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
